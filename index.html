<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PasteDrop — Offline Paste Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --paper: #f5f0e8;
    --paper2: #ede8dc;
    --accent: #c0392b;
    --accent2: #8b2218;
    --muted: #7a6e60;
    --border: #c8bfae;
    --tag-bg: #e8e0d0;
    --shadow: 4px 4px 0px #c8bfae;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(0,0,0,0.04) 27px,
        rgba(0,0,0,0.04) 28px
      );
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    cursor: pointer;
    user-select: none;
  }
  .logo span { color: var(--accent); }

  nav { display: flex; gap: 0.5rem; }
  nav button {
    background: transparent;
    border: 1px solid rgba(245,240,232,0.25);
    color: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    padding: 0.35rem 0.85rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  nav button:hover, nav button.active {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* HOME / EDITOR */
  .editor-wrap {
    max-width: 820px;
    margin: 3rem auto;
    padding: 0 1.5rem;
  }

  .editor-card {
    background: white;
    border: 2px solid var(--ink);
    box-shadow: var(--shadow);
    padding: 2rem;
  }

  .editor-card label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
    margin-top: 1.4rem;
  }
  .editor-card label:first-of-type { margin-top: 0; }

  .editor-card input[type="text"],
  .editor-card select {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1.5px solid var(--border);
    background: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .editor-card input:focus, .editor-card select:focus,
  .editor-card textarea:focus {
    border-color: var(--ink);
  }

  #paste-body {
    width: 100%;
    min-height: 320px;
    padding: 1rem;
    border: 1.5px solid var(--border);
    background: var(--paper);
    font-family: 'Lora', serif;
    font-size: 1rem;
    line-height: 1.75;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  .editor-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1.4rem;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .char-count {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .btn-publish {
    background: var(--ink);
    color: var(--paper);
    border: 2px solid var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.65rem 1.8rem;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 3px 3px 0 var(--accent);
  }
  .btn-publish:hover {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 3px 3px 0 var(--accent2);
    transform: translate(-1px, -1px);
  }

  /* PASTE VIEW */
  .paste-view-wrap {
    max-width: 820px;
    margin: 3rem auto;
    padding: 0 1.5rem;
  }

  .paste-meta {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .paste-title-display {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.15;
    max-width: 600px;
  }

  .paste-info {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0.04em;
  }

  .paste-actions { display: flex; gap: 0.5rem; flex-shrink: 0; flex-wrap: wrap; }

  .btn-sm {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.4rem 0.9rem;
    border: 1.5px solid var(--ink);
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }
  .btn-sm:hover { background: var(--ink); color: var(--paper); }
  .btn-sm.danger { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger:hover { background: var(--accent); color: white; }

  .paste-body-display {
    background: white;
    border: 2px solid var(--ink);
    box-shadow: var(--shadow);
    padding: 2rem 2.5rem;
    font-family: 'Lora', serif;
    font-size: 1.05rem;
    line-height: 1.85;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .paste-tag {
    display: inline-block;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    color: var(--muted);
    margin-right: 0.35rem;
  }

  /* LIST VIEW */
  .list-wrap {
    max-width: 820px;
    margin: 3rem auto;
    padding: 0 1.5rem;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .list-heading {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
  }

  .search-bar {
    display: flex;
    gap: 0;
    border: 1.5px solid var(--ink);
    overflow: hidden;
    background: white;
  }
  .search-bar input {
    border: none;
    padding: 0.5rem 0.8rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    background: transparent;
    min-width: 200px;
    color: var(--ink);
  }
  .search-bar button {
    background: var(--ink);
    border: none;
    color: var(--paper);
    padding: 0 0.8rem;
    cursor: pointer;
    font-size: 0.85rem;
  }

  .paste-list { display: flex; flex-direction: column; gap: 1rem; }

  .paste-item {
    background: white;
    border: 1.5px solid var(--border);
    padding: 1.2rem 1.5rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }
  .paste-item:hover {
    border-color: var(--ink);
    box-shadow: var(--shadow);
    transform: translate(-2px, -2px);
  }

  .paste-item-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .paste-item-preview {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'Lora', serif;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 480px;
  }
  .paste-item-date {
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  .empty-state {
    text-align: center;
    padding: 5rem 1rem;
    color: var(--muted);
  }
  .empty-state h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 0.5rem;
  }
  .empty-state p { font-size: 0.8rem; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: var(--paper);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.7rem 1.5rem;
    border-left: 4px solid var(--accent);
    z-index: 9999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,18,9,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 6px 6px 0 var(--accent);
    padding: 2rem;
    max-width: 480px;
    width: 90%;
  }
  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    margin-bottom: 1rem;
  }
  .modal-url {
    background: white;
    border: 1.5px solid var(--border);
    padding: 0.6rem 0.8rem;
    font-size: 0.75rem;
    word-break: break-all;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

  /* FILE ATTACHMENTS */
  .file-drop-zone {
    border: 2px dashed var(--border);
    background: var(--paper);
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .file-drop-zone:hover, .file-drop-zone.drag-over {
    border-color: var(--ink);
    background: var(--paper2);
  }
  .file-drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .file-drop-label {
    font-size: 0.75rem;
    color: var(--muted);
    pointer-events: none;
  }
  .file-drop-label span {
    display: block;
    font-size: 1.4rem;
    margin-bottom: 0.3rem;
  }

  .staged-files {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: 0.7rem;
  }
  .staged-file {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--paper2);
    border: 1px solid var(--border);
    padding: 0.45rem 0.7rem;
    font-size: 0.75rem;
  }
  .staged-file-icon { font-size: 1rem; flex-shrink: 0; }
  .staged-file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .staged-file-size { color: var(--muted); flex-shrink: 0; }
  .staged-file-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--accent);
    font-size: 1rem;
    line-height: 1;
    flex-shrink: 0;
    padding: 0;
  }
  .staged-file-remove:hover { color: var(--accent2); }

  /* ATTACHMENT VIEW */
  .attachments-section {
    margin-top: 1.5rem;
  }
  .attachments-heading {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .attachments-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.8rem;
  }
  .attachment-card {
    border: 1.5px solid var(--border);
    background: white;
    overflow: hidden;
    transition: all 0.15s;
  }
  .attachment-card:hover { border-color: var(--ink); box-shadow: 3px 3px 0 var(--border); }
  .attachment-preview {
    width: 100%;
    height: 110px;
    object-fit: cover;
    display: block;
    background: var(--paper2);
  }
  .attachment-file-icon {
    width: 100%;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    background: var(--paper2);
  }
  .attachment-info {
    padding: 0.5rem 0.6rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.4rem;
  }
  .attachment-name {
    font-size: 0.68rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .attachment-download {
    font-size: 0.7rem;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0.2rem 0.45rem;
    cursor: pointer;
    flex-shrink: 0;
    font-family: 'IBM Plex Mono', monospace;
    text-decoration: none;
  }
  .attachment-download:hover { background: var(--accent); }

  .size-warning {
    font-size: 0.68rem;
    color: var(--accent);
    margin-top: 0.5rem;
    display: none;
  }

  @media (max-width: 600px) {
    .paste-title-display { font-size: 1.4rem; }
    .paste-body-display { padding: 1.2rem 1rem; }
    .list-header { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
    .paste-item-preview { max-width: 200px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="showView('home')">Paste<span>Drop</span></div>
  <nav>
    <button onclick="showView('home')" id="nav-home">+ New Paste</button>
    <button onclick="showView('list')" id="nav-list">My Pastes</button>
  </nav>
</header>

<!-- HOME / EDITOR VIEW -->
<div id="view-home" class="view active">
  <div class="editor-wrap">
    <div class="editor-card">
      <label for="paste-title">Title (optional)</label>
      <input type="text" id="paste-title" placeholder="Untitled paste…">

      <label for="paste-body">Content</label>
      <textarea id="paste-body" placeholder="Start typing or paste your content here…" oninput="updateCount()"></textarea>

      <label>Attachments</label>
      <div class="file-drop-zone" id="drop-zone">
        <input type="file" id="file-input" multiple onchange="handleFiles(this.files)">
        <div class="file-drop-label">
          <span>📎</span>
          Click to attach files or drag &amp; drop here
        </div>
      </div>
      <div class="size-warning" id="size-warning">⚠ Large files may exceed browser storage limits (5 MB total recommended).</div>
      <div class="staged-files" id="staged-files"></div>

      <label for="paste-tag">Category Tag</label>
      <select id="paste-tag">
        <option value="">— none —</option>
        <option>Note</option>
        <option>Code</option>
        <option>Article</option>
        <option>List</option>
        <option>Draft</option>
        <option>Idea</option>
        <option>Other</option>
      </select>

      <div class="editor-footer">
        <span class="char-count" id="char-count">0 characters</span>
        <button class="btn-publish" onclick="publishPaste()">↑ Publish Paste</button>
      </div>
    </div>
  </div>
</div>

<!-- PASTE VIEW -->
<div id="view-paste" class="view">
  <div class="paste-view-wrap">
    <div class="paste-meta">
      <div>
        <div id="pv-tag"></div>
        <div class="paste-title-display" id="pv-title"></div>
        <div class="paste-info" id="pv-info"></div>
      </div>
      <div class="paste-actions">
        <button class="btn-sm" onclick="copyLink()">⎘ Copy Link</button>
        <button class="btn-sm" onclick="copyContent()">⎘ Copy Text</button>
        <button class="btn-sm" onclick="editPaste()">✎ Edit</button>
        <button class="btn-sm danger" onclick="deletePaste()">✕ Delete</button>
      </div>
    </div>
    <div class="paste-body-display" id="pv-body"></div>
    <div class="attachments-section" id="pv-attachments"></div>
  </div>
</div>

<!-- LIST VIEW -->
<div id="view-list" class="view">
  <div class="list-wrap">
    <div class="list-header">
      <h2 class="list-heading">All Pastes</h2>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search pastes…" oninput="renderList()">
        <button onclick="renderList()">⌕</button>
      </div>
    </div>
    <div class="paste-list" id="paste-list"></div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="modal-overlay" id="share-modal">
  <div class="modal">
    <h3>Paste published!</h3>
    <div class="modal-url" id="share-url"></div>
    <p style="font-size:0.72rem;color:var(--muted);margin-bottom:1rem;">
      This link works offline in the same browser. Share the file to use on other devices.
    </p>
    <div class="modal-actions">
      <button class="btn-sm" onclick="copyShareLink()">⎘ Copy Link</button>
      <button class="btn-sm" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── STORAGE ──────────────────────────────────────────────
  const STORE_KEY = 'pastedrop_pastes';

  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch { return {}; }
  }
  function save(db) {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(db));
      return true;
    } catch(e) {
      toast('⚠ Storage full! Remove some files or pastes.');
      return false;
    }
  }
  function uid() {
    return Math.random().toString(36).slice(2, 8) + Math.random().toString(36).slice(2, 6);
  }

  // ── FILE HANDLING ─────────────────────────────────────────
  let stagedFiles = []; // [{name, size, type, data(base64)}]

  function fileIcon(type) {
    if (type.startsWith('image/')) return '🖼';
    if (type.startsWith('video/')) return '🎬';
    if (type.startsWith('audio/')) return '🎵';
    if (type.includes('pdf')) return '📄';
    if (type.includes('zip') || type.includes('rar') || type.includes('7z')) return '🗜';
    if (type.includes('word') || type.includes('document')) return '📝';
    if (type.includes('sheet') || type.includes('excel') || type.includes('csv')) return '📊';
    if (type.includes('text') || type.includes('javascript') || type.includes('json')) return '📃';
    return '📎';
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function handleFiles(fileList) {
    const MAX_FILE = 4 * 1024 * 1024; // 4MB per file
    Array.from(fileList).forEach(file => {
      if (stagedFiles.find(f => f.name === file.name && f.size === file.size)) return;
      if (file.size > MAX_FILE) { toast(`"${file.name}" is too large (max 4 MB)`); return; }
      const reader = new FileReader();
      reader.onload = e => {
        stagedFiles.push({ name: file.name, size: file.size, type: file.type, data: e.target.result });
        renderStagedFiles();
      };
      reader.readAsDataURL(file);
    });
    // reset so same file can be re-added after removal
    document.getElementById('file-input').value = '';
  }

  function removeStagedFile(idx) {
    stagedFiles.splice(idx, 1);
    renderStagedFiles();
  }

  function renderStagedFiles() {
    const el = document.getElementById('staged-files');
    const warn = document.getElementById('size-warning');
    const totalSize = stagedFiles.reduce((s, f) => s + f.size, 0);
    warn.style.display = totalSize > 2 * 1024 * 1024 ? 'block' : 'none';

    if (!stagedFiles.length) { el.innerHTML = ''; return; }
    el.innerHTML = stagedFiles.map((f, i) => `
      <div class="staged-file">
        <span class="staged-file-icon">${fileIcon(f.type)}</span>
        <span class="staged-file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
        <span class="staged-file-size">${formatSize(f.size)}</span>
        <button class="staged-file-remove" onclick="removeStagedFile(${i})" title="Remove">✕</button>
      </div>
    `).join('');
  }

  // Drag & drop on the drop zone
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });

  // ── ROUTING ──────────────────────────────────────────────
  let currentPasteId = null;
  let editingId = null;

  function showView(name, pasteId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

    if (name === 'paste' && pasteId) {
      currentPasteId = pasteId;
      renderPasteView(pasteId);
      document.getElementById('view-paste').classList.add('active');
      window.location.hash = '#paste/' + pasteId;
    } else if (name === 'list') {
      renderList();
      document.getElementById('view-list').classList.add('active');
      document.getElementById('nav-list').classList.add('active');
      window.location.hash = '#list';
    } else {
      if (editingId) {
        const db = load();
        const p = db[editingId];
        if (p) {
          document.getElementById('paste-title').value = p.title;
          document.getElementById('paste-body').value = p.body;
          document.getElementById('paste-tag').value = p.tag || '';
          stagedFiles = (p.files || []).map(f => ({...f}));
          renderStagedFiles();
          updateCount();
        }
      } else {
        clearEditor();
      }
      document.getElementById('view-home').classList.add('active');
      document.getElementById('nav-home').classList.add('active');
      window.location.hash = editingId ? '#edit/' + editingId : '#new';
    }
  }

  function handleHash() {
    const hash = window.location.hash;
    if (hash.startsWith('#paste/')) {
      const id = hash.slice(7);
      if (load()[id]) showView('paste', id);
      else showView('home');
    } else if (hash === '#list') {
      showView('list');
    } else {
      showView('home');
    }
  }

  window.addEventListener('hashchange', handleHash);
  window.addEventListener('load', handleHash);

  // ── EDITOR ───────────────────────────────────────────────
  function updateCount() {
    const len = document.getElementById('paste-body').value.length;
    document.getElementById('char-count').textContent =
      len.toLocaleString() + ' character' + (len !== 1 ? 's' : '');
  }

  function clearEditor() {
    document.getElementById('paste-title').value = '';
    document.getElementById('paste-body').value = '';
    document.getElementById('paste-tag').value = '';
    stagedFiles = [];
    renderStagedFiles();
    updateCount();
    editingId = null;
  }

  function publishPaste() {
    const body = document.getElementById('paste-body').value.trim();
    if (!body && stagedFiles.length === 0) { toast('Add some content or attach a file.'); return; }

    const db = load();
    const id = editingId || uid();
    const now = new Date().toISOString();

    db[id] = {
      id,
      title: document.getElementById('paste-title').value.trim() || 'Untitled',
      body,
      tag: document.getElementById('paste-tag').value,
      files: stagedFiles.map(f => ({ name: f.name, size: f.size, type: f.type, data: f.data })),
      createdAt: editingId ? (db[id]?.createdAt || now) : now,
      updatedAt: now
    };

    if (!save(db)) return; // storage full

    const wasEditing = !!editingId;
    editingId = null;
    clearEditor();

    if (wasEditing) {
      toast('Paste updated!');
      showView('paste', id);
    } else {
      showShareModal(id);
      showView('paste', id);
    }
  }

  // ── PASTE VIEW ───────────────────────────────────────────
  function renderPasteView(id) {
    const db = load();
    const p = db[id];
    if (!p) { toast('Paste not found.'); showView('list'); return; }

    document.getElementById('pv-tag').innerHTML =
      p.tag ? `<span class="paste-tag">${escHtml(p.tag)}</span>` : '';
    document.getElementById('pv-title').textContent = p.title;
    document.getElementById('pv-body').textContent = p.body;

    const created = new Date(p.createdAt).toLocaleString();
    const updated = p.updatedAt !== p.createdAt
      ? ` · edited ${new Date(p.updatedAt).toLocaleString()}` : '';
    const fileCount = (p.files || []).length;
    document.getElementById('pv-info').textContent =
      `Created ${created}${updated} · ${p.body.length.toLocaleString()} chars` +
      (fileCount ? ` · ${fileCount} file${fileCount > 1 ? 's' : ''}` : '');

    // Render attachments
    const attEl = document.getElementById('pv-attachments');
    const files = p.files || [];
    if (!files.length) { attEl.innerHTML = ''; return; }

    attEl.innerHTML = `
      <div class="attachments-section">
        <div class="attachments-heading">Attachments (${files.length})</div>
        <div class="attachments-grid">
          ${files.map((f, i) => `
            <div class="attachment-card">
              ${f.type.startsWith('image/')
                ? `<img class="attachment-preview" src="${f.data}" alt="${escHtml(f.name)}" loading="lazy">`
                : `<div class="attachment-file-icon">${fileIcon(f.type)}</div>`}
              <div class="attachment-info">
                <span class="attachment-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
                <a class="attachment-download" href="${f.data}" download="${escHtml(f.name)}" title="Download ${escHtml(f.name)}">↓</a>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  function copyLink() {
    navigator.clipboard.writeText(pasteUrl(currentPasteId)).then(() => toast('Link copied!'));
  }

  function copyContent() {
    const p = load()[currentPasteId];
    if (!p) return;
    navigator.clipboard.writeText(p.body).then(() => toast('Content copied!'));
  }

  function editPaste() {
    editingId = currentPasteId;
    showView('home');
  }

  function deletePaste() {
    if (!confirm('Delete this paste and all its attachments? This cannot be undone.')) return;
    const db = load();
    delete db[currentPasteId];
    save(db);
    toast('Paste deleted.');
    showView('list');
  }

  // ── LIST VIEW ────────────────────────────────────────────
  function renderList() {
    const db = load();
    const query = (document.getElementById('search-input')?.value || '').toLowerCase();
    const list = document.getElementById('paste-list');

    const pastes = Object.values(db)
      .filter(p => !query ||
        p.title.toLowerCase().includes(query) ||
        p.body.toLowerCase().includes(query) ||
        (p.tag || '').toLowerCase().includes(query) ||
        (p.files || []).some(f => f.name.toLowerCase().includes(query)))
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    if (!pastes.length) {
      list.innerHTML = `<div class="empty-state">
        <h2>${query ? 'No results found.' : 'No pastes yet.'}</h2>
        <p>${query ? 'Try a different search term.' : 'Create your first paste using the + New Paste button.'}</p>
      </div>`;
      return;
    }

    list.innerHTML = pastes.map(p => {
      const fc = (p.files || []).length;
      return `
        <div class="paste-item" onclick="showView('paste','${p.id}')">
          <div style="overflow:hidden">
            ${p.tag ? `<span class="paste-tag">${escHtml(p.tag)}</span>` : ''}
            ${fc ? `<span class="paste-tag">📎 ${fc} file${fc>1?'s':''}</span>` : ''}
            <div class="paste-item-title">${escHtml(p.title)}</div>
            <div class="paste-item-preview">${escHtml((p.body || '(no text)').slice(0, 120))}</div>
          </div>
          <div class="paste-item-date">${formatDate(p.createdAt)}</div>
        </div>`;
    }).join('');
  }

  // ── SHARE MODAL ──────────────────────────────────────────
  function showShareModal(id) {
    document.getElementById('share-url').textContent = pasteUrl(id);
    document.getElementById('share-modal').classList.add('open');
  }
  function copyShareLink() {
    navigator.clipboard.writeText(document.getElementById('share-url').textContent)
      .then(() => toast('Link copied!'));
  }
  function closeModal() {
    document.getElementById('share-modal').classList.remove('open');
  }
  document.getElementById('share-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── HELPERS ──────────────────────────────────────────────
  function pasteUrl(id) {
    return window.location.href.split('#')[0] + '#paste/' + id;
  }
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function formatDate(iso) {
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
